name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm approve-builds core-js esbuild
      - run: pnpm install --frozen-lockfile

      - name: Build GDL toolchain
        run: cd gdl && pnpm install --frozen-lockfile && pnpm run build

      - name: Build extension
        run: pnpm run build

      - name: Run tests
        run: npx vitest run

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/index.js
            dist/index.js.map
            dist/info.json

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm approve-builds core-js esbuild
      - run: pnpm install --frozen-lockfile

      - name: Build GDL toolchain
        run: cd gdl && pnpm install --frozen-lockfile && pnpm run build

      - name: Verify tag matches package.json version
        id: meta
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "zip_name=subnautica2-vortex-v${PKG_VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: node gdl/dist/cli.js package

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*.zip
          generate_release_notes: true

      - name: Publish to Nexus Mods
        uses: Nexus-Mods/upload-action@main
        with:
          api_key: ${{ secrets.NEXUS_API_KEY }}
          file_group_id: '7418978'
          display_name: Subnautica 2 Support for Vortex
          filename: out/${{ steps.meta.outputs.zip_name }}
          version: ${{ steps.meta.outputs.version }}
          archive_existing_file: true

      - name: Update Nexus Mods page version
        run: |
          curl -sf -X POST \
            "https://api.nexusmods.com/v1/games/site/mods/1891/edit.json" \
            -H "apikey: ${{ secrets.NEXUS_API_KEY }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "version=${{ steps.meta.outputs.version }}"
