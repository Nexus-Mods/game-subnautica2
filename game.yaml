gdl: 1

game:
  id: subnautica2
  name: Subnautica 2
  executable: Subnautica2.exe
  requiredFiles:
    - Subnautica2.exe
  logo: gameart.webp
  contributedBy: tbaldridge

stores:
  steam: 1962700
  epic:  22bfc34d90b64054809542014fc9eb32

context:
  installDir: Subnautica2
  paksRoot:           ${installPath}/Subnautica2/Content/Paks/~mods
  logicRoot:          ${installPath}/Subnautica2/Content/Paks/LogicMods
  ue4ssRoot:          ${installPath}/Subnautica2/Binaries/Win64/ue4ss/Mods
  ue4ssInjectorRoot:
    storeBranch:
      xbox:    ${installPath}/Subnautica2/Binaries/WinGDK
      default: ${installPath}/Subnautica2/Binaries/Win64

modTypes:
  - { id: pak,            name: "Paks (~mods)",               path: "${paksRoot}" }
  - { id: logic-mod,      name: "LogicMods (Blueprint paks)", path: "${logicRoot}" }
  - { id: ue4ss-lua,      name: "UE4SS (Lua scripts)",        path: "${ue4ssRoot}" }
  - { id: ue4ss-injector, name: "UE4SS Injector",             path: "${ue4ssInjectorRoot}" }
  - { id: root,           name: "Root (game folder)",         path: "${installPath}" }

installers:
  - id: ue4ss-injector
    priority: 15
    when:    { hasFile: "**/{dwmapi.dll,xinput1_4.dll,ue4ss-settings.ini}" }
    anchor:  "**/{dwmapi.dll,xinput1_4.dll,ue4ss-settings.ini}"
    take:    parent
    placeAt: "${ue4ssInjectorRoot}"
    modType: ue4ss-injector

  - id: logic-mod
    priority: 20
    when:    { hasFile: "**/LogicMods/**/*.pak" }
    anchor:  "**/LogicMods/"
    take:    self
    placeAt: "${logicRoot}"
    modType: logic-mod

  - id: ue4ss-lua
    priority: 22
    when:    { hasFile: "**/Scripts/*.lua" }
    anchor:  "**/Scripts/*.lua"
    take:    parent.parent
    placeAt: "${ue4ssRoot}"
    modType: ue4ss-lua

  - id: ue4ss-lua-enabled
    priority: 23
    when:    { hasFile: "**/enabled.txt" }
    unless:  { hasFile: "**/Scripts/*.lua" }
    anchor:  "**/enabled.txt"
    take:    parent.parent
    placeAt: "${ue4ssRoot}"
    modType: ue4ss-lua

  - id: pak
    priority: 30
    when:    { hasFile: "**/*.pak" }
    unless:
      any:
        - { hasFile: "**/LogicMods/**" }
        - { hasFile: "**/Scripts/*.lua" }
        - { hasFile: "**/{dwmapi.dll,xinput1_4.dll,ue4ss-settings.ini}" }
        - { hasFile: "**/Subnautica2/**" }
        - { hasFile: "**/Engine/**" }
        - { hasFile: "**/Binaries/**" }
    anchor:  "**/*.pak"
    take:    parent
    placeAt: "${paksRoot}"
    modType: pak

  - id: root
    priority: 40
    when:
      any:
        - { hasFile: "**/Subnautica2/**" }
        - { hasFile: "**/Engine/**" }
        - { hasFile: "**/Binaries/**" }
    unless:
      any:
        - { hasFile: "**/LogicMods/**" }
        - { hasFile: "**/Scripts/*.lua" }
        - { hasFile: "**/{dwmapi.dll,xinput1_4.dll,ue4ss-settings.ini}" }
    anchor:  "**/*"
    take:    archive-root
    placeAt: "${installPath}"
    modType: root

discovery: {}

setup:
  ensureDirs:
    - ${paksRoot}
    - ${logicRoot}
    - ${ue4ssRoot}

events:
  did-deploy: { hook: regenerateModsTxt }

nexus:
  modId: 1234              # PLACEHOLDER — replace with the real subnautica2 mod-page id when known
  fileGroupId: 7418978     # PLACEHOLDER — matches the existing legacy CI's file_group_id
  displayName: Subnautica 2 Support for Vortex

tests:
  corpus: nexus
  cases:
    - name: typical pak mod
      archive:
        - MyMod/CoolPak.pak
        - MyMod/Readme.md
      expect:
        matched: pak
        modType: pak

    - name: typical logic-mod
      archive:
        - SomePack/LogicMods/BPFolder/X.pak
        - SomePack/LogicMods/Y.pak
      expect:
        matched: logic-mod
        modType: logic-mod

    - name: ue4ss lua with Scripts preserves mod-name in destination
      archive:
        - MyLuaMod/Scripts/main.lua
        - MyLuaMod/Scripts/util.lua
      expect:
        matched: ue4ss-lua
        modType: ue4ss-lua

    - name: enabled.txt-only ue4ss mod
      archive:
        - MyLuaMod/enabled.txt
        - MyLuaMod/data.json
      expect:
        matched: ue4ss-lua-enabled
        modType: ue4ss-lua

    - name: ue4ss injector mod
      archive:
        - Pack/inject/dwmapi.dll
        - Pack/inject/ue4ss/Mods/keep
      expect:
        matched: ue4ss-injector
        modType: ue4ss-injector

    - name: root archive — whole game folder
      archive:
        - Subnautica2/Content/Paks/foo.pak
        - Engine/Content/bar.uasset
      expect:
        matched: root
        modType: root

toolbarActions:
  - id: open-ue4ss-settings
    title: Open UE4SS Settings INI
    priority: 200
    target: { openFile: "${ue4ssRoot}/../UE4SS-settings.ini" }

  - id: open-mods-txt
    title: Open UE4SS mods.txt
    priority: 201
    target: { openFile: "${ue4ssRoot}/mods.txt" }

  - id: open-nexus-page
    title: Open Nexus Page
    priority: 202
    target: { openUrl: "https://www.nexusmods.com/subnautica2" }
